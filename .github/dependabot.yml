version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      production:
        dependency-type: production
      development:
        dependency-type: development
    ignore:
      # commander is version-synced with cli/package.json (a test enforces
      # it), and the cli supports Node >=20.12 while commander 15 requires
      # Node >=22.12. Major bumps are a deliberate cli decision.
      - dependency-name: commander
        update-types: ["version-update:semver-major"]
      # typescript-eslint's peer range caps TypeScript at <6.1.0, so a TS
      # major in the dev group breaks npm ci with ERESOLVE (PR #301). TS
      # majors are a deliberate decision gated on typescript-eslint support.
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  # Keeps the digest-pinned FROM lines in the Dockerfile current when
  # upstream node:24-slim rebuilds (e.g. Debian security releases).
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    ignore:
      # A base-image major is a Node.js major — the server pins
      # engines >=24 <25 (.nvmrc, Lambda runtime nodejs24.x). Node
      # version upgrades are deliberate, not dependency churn.
      - dependency-name: node
        update-types: ["version-update:semver-major"]
