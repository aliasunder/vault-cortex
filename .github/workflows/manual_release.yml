name: Manual Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  bump-and-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.next.outputs.version }}
      tag: v${{ steps.next.outputs.version }}
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Calculate next version
        id: next
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          CURRENT=$(jq -r '.version' package.json)
          if [ "$CURRENT" = "null" ] || [ -z "$CURRENT" ]; then
            echo "::error::package.json has no version field; cannot compute next version"
            exit 1
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT -> $NEXT ($BUMP)"

      - name: Bump package.json, package-lock.json, and server.json
        env:
          NEXT: ${{ steps.next.outputs.version }}
        run: |
          npm version "$NEXT" --no-git-tag-version
          jq --arg v "$NEXT" '.version = $v | .packages[0].identifier = "ghcr.io/aliasunder/vault-mcp:" + $v' server.json > server.json.tmp && mv server.json.tmp server.json
          npx prettier --write server.json

      - name: Commit, tag, and push
        env:
          NEXT: ${{ steps.next.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json server.json
          git commit -m "release: v$NEXT"
          git tag "v$NEXT"
          git push origin HEAD --tags

  deploy:
    needs: bump-and-tag
    uses: ./.github/workflows/deploy.yml
    with:
      version: ${{ needs.bump-and-tag.outputs.version }}
    secrets: inherit

  publish-registry:
    needs: [bump-and-tag, deploy]
    uses: ./.github/workflows/publish-registry.yml
    with:
      version: ${{ needs.bump-and-tag.outputs.version }}

  release:
    needs: [bump-and-tag, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ needs.bump-and-tag.outputs.tag }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Generate release notes
        env:
          TAG: ${{ needs.bump-and-tag.outputs.tag }}
        run: bash .github/scripts/generate-notes.sh "$TAG" > /tmp/release-notes.md

      - name: Update changelog
        env:
          VERSION: ${{ needs.bump-and-tag.outputs.version }}
        run: bash .github/scripts/update-changelog.sh "$VERSION" /tmp/release-notes.md

      - name: Commit changelog update to main
        env:
          TAG: ${{ needs.bump-and-tag.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          git stash pop
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No CHANGELOG.md changes to commit"
            exit 0
          fi
          git commit -m "docs: update CHANGELOG.md for $TAG"
          git push origin main

      - name: Create GitHub release
        timeout-minutes: 2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.bump-and-tag.outputs.tag }}
        run: |
          for i in 1 2 3; do
            if gh release create "$TAG" \
                 --title "$TAG" \
                 --notes-file /tmp/release-notes.md; then
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Failed to create release after 3 attempts"
          exit 1
