name: Test Deploy

# Manual deploy of any branch to the Lightsail instance — for testing large
# changes (Dockerfile rewrites, compose changes, infra) against production
# without cutting a release. Runs SST, optionally rebuilds the image, and
# restarts the compose stack with the branch's docker-compose.yml.
#
# Release artifacts are never touched: the image pushes only to the `:test`
# tag (never `:remote`, `:latest`, or version tags), so OSS users pulling
# the released image are unaffected. The instance is switched to the test
# image via VAULT_CORTEX_TAG=test in its .env. To return to the released
# image, run Force Deploy — it rewrites the .env without VAULT_CORTEX_TAG
# (compose falls back to `:remote`) and re-ships main's docker-compose.yml.
#
# Dispatch from the Actions UI and select the branch to test — checkout
# defaults to the dispatched ref. No branch guard: it skipped every run
# when tried on the old Phase 2 workflow (see PR #216).
on:
  workflow_dispatch:
    inputs:
      skip_build:
        description: >-
          Skip Docker image build/push — only run SST deploy and restart
          the compose stack with the existing :test image.
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-prod
  cancel-in-progress: false

# Top-level token is read-only; the job declares its writes.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # AWS OIDC role assumption
      contents: read
      packages: write # GHCR image push
    env:
      AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
      SST_STAGE: ${{ secrets.SST_STAGE }}
      IMAGE: ghcr.io/${{ vars.GHCR_USER }}/vault-cortex
      TAILSCALE_ENABLED: ${{ secrets.TAILSCALE_SSH_HOST != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: SST deploy
        env:
          SSH_PUBKEY: ${{ secrets.SSH_PUBKEY }}
          SSH_CIDRS: ${{ secrets.SSH_CIDRS }}
          ORIGIN_URL: ${{ secrets.ORIGIN_URL }}
          MCP_PORT_CIDRS: ${{ secrets.MCP_PORT_CIDRS }}
          CUSTOM_DOMAIN: ${{ secrets.CUSTOM_DOMAIN }}
          CUSTOM_DOMAIN_CERT_ARN: ${{ secrets.CUSTOM_DOMAIN_CERT_ARN }}
        run: npx sst deploy --stage "$SST_STAGE"

      - name: Connect to Tailscale
        if: env.TAILSCALE_ENABLED == 'true'
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      # The IP is fetched from AWS rather than exposed as an SST output —
      # SST prints outputs at the end of every deploy, which on a public
      # repo means public Actions logs. The static-ip name matches
      # sst.config.ts (`vault-cortex-ip-${stage}`).
      - name: Fetch Lightsail IP from AWS
        id: sst
        run: |
          ip=$(aws lightsail get-static-ip \
            --static-ip-name "vault-cortex-ip-${SST_STAGE}" \
            --query staticIp.ipAddress --output text)
          if [ -z "$ip" ] || [ "$ip" = "None" ]; then
            echo "::error::could not resolve the Lightsail static IP from AWS"
            exit 1
          fi
          # Forward-only mask: keeps the IP out of later steps' env headers
          # and echoes in the public job log.
          echo "::add-mask::$ip"
          echo "ip=$ip" >> "$GITHUB_OUTPUT"

      - name: Resolve SSH target
        id: ssh
        env:
          TAILSCALE_HOST: ${{ secrets.TAILSCALE_SSH_HOST }}
          PUBLIC_IP: ${{ steps.sst.outputs.ip }}
        run: |
          if [ -n "$TAILSCALE_HOST" ]; then
            echo "host=$TAILSCALE_HOST" >> "$GITHUB_OUTPUT"
          else
            echo "host=$PUBLIC_IP" >> "$GITHUB_OUTPUT"
          fi

      # amd64 only — the Lightsail instance is amd64 and the :test tag is
      # never published to users, so the slow QEMU arm64 cross-build (no
      # setup-qemu-action here) buys nothing per test iteration. Only the
      # remote target builds: it's what the instance runs.
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        if: ${{ !inputs.skip_build }}

      # Bust the apt-get upgrade layer so test images ship current Debian
      # security patches — same pattern as deploy.yml and trivy.yml.
      - name: Cache-bust date for apt-get upgrade
        if: ${{ !inputs.skip_build }}
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR (build push)
        if: ${{ !inputs.skip_build }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ vars.GHCR_USER }}
          password: ${{ secrets.GHCR_TOKEN }}

      # Labels rather than index annotations: a single-platform push may not
      # produce an image index to annotate, and the :test tag needs no GHCR
      # package-page description. The revision label records which commit
      # :test currently holds — `docker inspect` on the instance shows it.
      - name: Build and push image
        if: ${{ !inputs.skip_build }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: remote
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:test
          build-args: APT_UPGRADE_DATE=${{ steps.date.outputs.date }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/aliasunder/vault-cortex
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Wait for Docker on Lightsail
        env:
          IP: ${{ steps.ssh.outputs.host }}
        run: |
          deadline=$((SECONDS + 120))
          until ssh -o StrictHostKeyChecking=accept-new ubuntu@"$IP" 'docker --version' >/dev/null 2>&1; do
            if [ $SECONDS -ge $deadline ]; then
              echo "::error::Docker not ready on $IP after 120s"
              exit 1
            fi
            sleep 5
          done

      - name: Bootstrap deploy directory and GHCR login on instance
        env:
          IP: ${{ steps.ssh.outputs.host }}
          GHCR_USER: ${{ vars.GHCR_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new ubuntu@"$IP" \
            'sudo mkdir -p /opt/vault-cortex && sudo chown ubuntu:ubuntu /opt/vault-cortex'
          printf '%s' "$GHCR_TOKEN" | ssh -o StrictHostKeyChecking=accept-new ubuntu@"$IP" \
            "docker login ghcr.io -u '$GHCR_USER' --password-stdin"

      - name: Write Lightsail .env from secrets
        env:
          PUBLIC_URL: ${{ secrets.PUBLIC_URL }}
          MCP_AUTH_TOKEN: ${{ secrets.MCP_AUTH_TOKEN }}
          OBSIDIAN_AUTH_TOKEN: ${{ secrets.OBSIDIAN_AUTH_TOKEN }}
          VAULT_NAME: ${{ secrets.VAULT_NAME }}
          VAULT_PASSWORD: ${{ secrets.VAULT_PASSWORD }}
          GHCR_USER: ${{ vars.GHCR_USER }}
          EMBEDDING_ENABLED: ${{ vars.EMBEDDING_ENABLED }}
          RERANK_MODE: ${{ vars.RERANK_MODE }}
          MEMORY_ENABLED: ${{ vars.MEMORY_ENABLED }}
          MEMORY_DIR: ${{ vars.MEMORY_DIR }}
          PROTECTED_PATHS: ${{ vars.PROTECTED_PATHS }}
          ORPHAN_EXCLUDE_FOLDERS: ${{ vars.ORPHAN_EXCLUDE_FOLDERS }}
          SERVICE_DOCUMENTATION_URL: ${{ vars.SERVICE_DOCUMENTATION_URL }}
          TZ: ${{ vars.TZ }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          LOG_DIR: ${{ vars.LOG_DIR }}
          LOG_RETENTION_DAYS: ${{ vars.LOG_RETENTION_DAYS }}
          WINDOWS_MODE: ${{ vars.WINDOWS_MODE }}
        run: |
          umask 077
          cat > "$RUNNER_TEMP/lightsail.env" <<EOF
          MCP_AUTH_TOKEN=$MCP_AUTH_TOKEN
          PUBLIC_URL=$PUBLIC_URL
          OBSIDIAN_AUTH_TOKEN=$OBSIDIAN_AUTH_TOKEN
          VAULT_NAME=$VAULT_NAME
          VAULT_PASSWORD=$VAULT_PASSWORD
          GHCR_USER=$GHCR_USER
          EMBEDDING_ENABLED=${EMBEDDING_ENABLED:-true}
          RERANK_MODE=${RERANK_MODE:-blended}
          MEMORY_ENABLED=${MEMORY_ENABLED:-true}
          MEMORY_DIR=${MEMORY_DIR:-About Me}
          PUID=1000
          PGID=1000
          DEVICE_NAME=vault-cortex-lightsail
          CONFLICT_STRATEGY=merge
          SYNC_MODE=bidirectional
          LOG_LEVEL=${LOG_LEVEL:-info}
          LOG_DIR=${LOG_DIR:-/data/logs}
          LOG_RETENTION_DAYS=${LOG_RETENTION_DAYS:-30}
          WINDOWS_MODE=${WINDOWS_MODE:-false}
          TZ=${TZ:-UTC}
          VAULT_CORTEX_TAG=test
          EOF
          # Only write user-specific overrides when the repo Variable is set —
          # the server falls back to sensible defaults when these are absent.
          if [ -n "$PROTECTED_PATHS" ]; then echo "PROTECTED_PATHS=$PROTECTED_PATHS" >> "$RUNNER_TEMP/lightsail.env"; fi
          if [ -n "$ORPHAN_EXCLUDE_FOLDERS" ]; then echo "ORPHAN_EXCLUDE_FOLDERS=$ORPHAN_EXCLUDE_FOLDERS" >> "$RUNNER_TEMP/lightsail.env"; fi
          if [ -n "$SERVICE_DOCUMENTATION_URL" ]; then echo "SERVICE_DOCUMENTATION_URL=$SERVICE_DOCUMENTATION_URL" >> "$RUNNER_TEMP/lightsail.env"; fi

      - name: Ship compose + .env to instance
        env:
          IP: ${{ steps.ssh.outputs.host }}
        run: |
          scp -o StrictHostKeyChecking=accept-new docker-compose.yml ubuntu@"$IP":/opt/vault-cortex/docker-compose.yml
          scp -o StrictHostKeyChecking=accept-new "$RUNNER_TEMP/lightsail.env" ubuntu@"$IP":/opt/vault-cortex/.env

      - name: Pull and restart compose stack
        env:
          IP: ${{ steps.ssh.outputs.host }}
        run: |
          # --remove-orphans + --wait-timeout 300: same flags as deploy.yml —
          # retires containers whose services no longer exist in the compose
          # file and covers the s6 init chain (Obsidian login + sync-setup)
          # that runs before /healthz comes up.
          ssh -o StrictHostKeyChecking=accept-new ubuntu@"$IP" \
            'cd /opt/vault-cortex && docker compose pull && docker compose up -d --remove-orphans --wait --wait-timeout 300 && docker image prune -f'

      - name: Healthcheck
        env:
          PUBLIC_URL: ${{ secrets.PUBLIC_URL }}
        run: curl -fsS --retry 6 --retry-delay 5 "$PUBLIC_URL/healthz"
