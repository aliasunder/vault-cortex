name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Guard server.json description length (≤100 chars)
        run: |
          length=$(jq -r '.description | length' server.json)
          if [ "$length" -gt 100 ]; then
            echo "::error::server.json description is ${length} chars (limit: 100). The MCP Registry rejects descriptions > 100 chars with 422."
            exit 1
          fi

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run prettier:check

      - run: npm run lint

      - run: npm test

      - run: npm run build

  # The cli package targets older runtimes than the server (engines >=20.12),
  # but the repo's @types/node tracks the server's Node version — so only a
  # runtime smoke test catches accidental use of too-new APIs in the CLI.
  cli-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false # job only builds and runs the CLI; no git pushes

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npx tsc -p cli/tsconfig.json

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run the built CLI on Node ${{ matrix.node-version }}
        run: |
          node cli/dist/bin.js --help
          mkdir -p /tmp/smoke-vault/.obsidian
          node cli/dist/bin.js init --yes --vault-path /tmp/smoke-vault --dir /tmp/smoke-out
          grep -q "VAULT_PATH=/tmp/smoke-vault" /tmp/smoke-out/.env
