name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run prettier:check

      - run: npm run lint

      - run: npm test

      # `sst-env.d.ts` is generated by `sst deploy`/`sst dev` and gitignored.
      # CI doesn't have AWS credentials on PR runs, so we stub the secret
      # types here so `tsc` can type-check. Keep this list in sync with
      # the `sst.Secret` declarations in sst.config.ts.
      - name: Stub sst-env.d.ts for typecheck
        run: |
          cat > sst-env.d.ts <<'EOF'
          /* Stub generated by .github/workflows/ci.yml — see sst.config.ts for source of truth. */
          import "sst"
          declare module "sst" {
            export interface Resource {
              McpAuthToken: { type: "sst.sst.Secret"; value: string }
              ObsidianAuthToken: { type: "sst.sst.Secret"; value: string }
              ObsidianVaultName: { type: "sst.sst.Secret"; value: string }
            }
          }
          export {}
          EOF

      - run: npm run build
