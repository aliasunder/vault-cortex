name: Auto Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-prod
  cancel-in-progress: false

# Top-level token is read-only; each job declares the writes it needs.
# A job-level permissions block replaces the whole set — every block
# must re-state contents: read for checkout.
permissions:
  contents: read

jobs:
  validate:
    if: github.actor != 'vault-cortex-release[bot]'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Extract version from tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Validate package.json version matches tag
        env:
          TAG_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          PKG_VERSION=$(jq -r '.version' package.json)
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag (v$TAG_VERSION)"
            exit 1
          fi
          echo "package.json version matches tag v$TAG_VERSION"

  deploy:
    needs: validate
    # Ceiling for the reusable workflow: AWS OIDC + GHCR push.
    permissions:
      id-token: write
      contents: read
      packages: write
    uses: ./.github/workflows/deploy.yml
    with:
      version: ${{ needs.validate.outputs.version }}
    secrets: inherit

  publish-registry:
    needs: [validate, deploy]
    # Ceiling for the reusable workflow: MCP Registry OIDC.
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/publish-registry.yml
    with:
      version: ${{ needs.validate.outputs.version }}

  sync-dockerhub-description:
    needs: [validate, deploy]
    permissions:
      contents: read
    uses: ./.github/workflows/dockerhub-description.yml
    secrets: inherit

  release:
    needs: [validate, deploy]
    runs-on: ubuntu-latest
    # gh release create uses GITHUB_TOKEN; the CHANGELOG push to main
    # authenticates as the release App, not this token. generate-notes.sh
    # reads merged PRs (labels/body) for breaking-change detection, so the
    # token also needs pull-requests: read.
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/generate-notes.sh "$GITHUB_REF_NAME" > /tmp/release-notes.md

      - name: Update changelog
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: bash .github/scripts/update-changelog.sh "$VERSION" /tmp/release-notes.md

      - name: Commit changelog update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git checkout main
          git stash pop
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No CHANGELOG.md changes to commit"
            exit 0
          fi
          git commit -m "docs: update CHANGELOG.md for $GITHUB_REF_NAME"
          git push origin main

      - name: Create GitHub release
        timeout-minutes: 2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in 1 2 3; do
            if gh release create "$GITHUB_REF_NAME" \
                 --title "$GITHUB_REF_NAME" \
                 --notes-file /tmp/release-notes.md; then
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Failed to create release after 3 attempts"
          exit 1
