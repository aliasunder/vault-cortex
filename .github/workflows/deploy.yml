name: Deploy

on:
  workflow_call:
    inputs:
      version:
        description: Version being deployed (used as Docker image tag)
        required: true
        type: string
      skip_build:
        description: >-
          Skip the image build/push and redeploy the already-published image.
          A rebuild at an old tag would overwrite the release artifact with
          different bits (base-image patches land at build time) — forced
          redeploys must reuse what the release published.
        required: false
        default: false
        type: boolean
      skip_instance:
        description: >-
          Skip SST deploy and Lightsail instance update (SSH, compose
          restart, healthcheck). The image is still built and pushed to
          GHCR and Docker Hub. Use when restarting compose would
          overwrite a manually-deployed stack.
        required: false
        default: false
        type: boolean

# Top-level token is read-only; the job declares its writes. Callers'
# job-level grants are the ceiling — they must cover the same set.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # AWS OIDC role assumption
      contents: read
      packages: write # GHCR image push
    env:
      AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
      SST_STAGE: ${{ secrets.SST_STAGE }}
      IMAGE: ghcr.io/${{ vars.GHCR_USER }}/vault-cortex
      IMAGE_HUB: ${{ vars.DOCKERHUB_USERNAME != '' && format('docker.io/{0}/vault-cortex', vars.DOCKERHUB_USERNAME) || '' }}
      TAILSCALE_ENABLED: ${{ secrets.TAILSCALE_SSH_HOST != '' }}
    steps:
      # Build from the release tag, not the default checkout SHA. On a manual
      # release the tag (created by bump-and-tag) points at the version-bump
      # commit, while github.sha is the pre-bump dispatch commit — checking out
      # the latter stamps the image one version behind the release it ships as.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: v${{ inputs.version }}
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Configure AWS credentials (OIDC)
        if: ${{ !inputs.skip_instance }}
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: SST deploy
        if: ${{ !inputs.skip_instance }}
        env:
          SSH_PUBKEY: ${{ secrets.SSH_PUBKEY }}
          SSH_CIDRS: ${{ secrets.SSH_CIDRS }}
          ORIGIN_URL: ${{ secrets.ORIGIN_URL }}
          MCP_PORT_CIDRS: ${{ secrets.MCP_PORT_CIDRS }}
          CUSTOM_DOMAIN: ${{ secrets.CUSTOM_DOMAIN }}
          CUSTOM_DOMAIN_CERT_ARN: ${{ secrets.CUSTOM_DOMAIN_CERT_ARN }}
        run: npx sst deploy --stage "$SST_STAGE"

      - name: Connect to Tailscale
        if: ${{ !inputs.skip_instance && env.TAILSCALE_ENABLED == 'true' }}
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      # The IP is fetched from AWS rather than exposed as an SST output —
      # SST prints outputs at the end of every deploy, which on a public
      # repo means public Actions logs. The static-ip name matches
      # sst.config.ts (`vault-cortex-ip-${stage}`).
      - name: Fetch Lightsail IP from AWS
        if: ${{ !inputs.skip_instance }}
        id: sst
        run: |
          ip=$(aws lightsail get-static-ip \
            --static-ip-name "vault-cortex-ip-${SST_STAGE}" \
            --query staticIp.ipAddress --output text)
          if [ -z "$ip" ] || [ "$ip" = "None" ]; then
            echo "::error::could not resolve the Lightsail static IP from AWS"
            exit 1
          fi
          # Forward-only mask: keeps the IP out of later steps' env headers
          # and echoes in the public job log.
          echo "::add-mask::$ip"
          echo "ip=$ip" >> "$GITHUB_OUTPUT"

      - name: Resolve SSH target
        if: ${{ !inputs.skip_instance }}
        id: ssh
        env:
          TAILSCALE_HOST: ${{ secrets.TAILSCALE_SSH_HOST }}
          PUBLIC_IP: ${{ steps.sst.outputs.ip }}
        run: |
          if [ -n "$TAILSCALE_HOST" ]; then
            echo "host=$TAILSCALE_HOST" >> "$GITHUB_OUTPUT"
          else
            echo "host=$PUBLIC_IP" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        if: ${{ !inputs.skip_build }}

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        if: ${{ !inputs.skip_build }}

      # The base stage's apt-get upgrade layer is content-addressed — it
      # caches indefinitely until the Dockerfile or base image changes.
      # Passing today's date as APT_UPGRADE_DATE busts that layer so
      # Debian security patches are always current in the released image.
      - name: Cache-bust date for apt-get upgrade
        if: ${{ !inputs.skip_build }}
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR (build push)
        if: ${{ !inputs.skip_build }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ vars.GHCR_USER }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Log in to Docker Hub (build push)
        if: ${{ !inputs.skip_build && env.IMAGE_HUB != '' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Two build-push steps, one per Dockerfile target. The deps/build/base
      # stages are shared, so the gha cache makes the second step cheap.
      # Remote pushes FIRST on purpose: both steps annotate the same GHCR
      # package, and the package page shows the most recently pushed index
      # description — pushing local last keeps the page description matching
      # server.json / the base Dockerfile LABEL.
      - name: Build and push image (remote target)
        if: ${{ !inputs.skip_build }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: remote
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:v${{ inputs.version }}-remote
            ${{ env.IMAGE }}:remote
            ${{ env.IMAGE_HUB != '' && format('{0}:v{1}-remote', env.IMAGE_HUB, inputs.version) || '' }}
            ${{ env.IMAGE_HUB != '' && format('{0}:remote', env.IMAGE_HUB) || '' }}
          build-args: APT_UPGRADE_DATE=${{ steps.date.outputs.date }}
          # Mirror the remote-stage Dockerfile LABEL description.
          annotations: |
            index:org.opencontainers.image.title=vault-cortex
            index:org.opencontainers.image.description=Standalone MCP server for Obsidian vaults with bundled Obsidian Sync — hybrid search, structured memory, OAuth 2.1.
            index:org.opencontainers.image.source=https://github.com/aliasunder/vault-cortex
            index:org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image (local target)
        if: ${{ !inputs.skip_build }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: local
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:v${{ inputs.version }}
            ${{ env.IMAGE }}:${{ inputs.version }}
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE_HUB != '' && format('{0}:v{1}', env.IMAGE_HUB, inputs.version) || '' }}
            ${{ env.IMAGE_HUB != '' && format('{0}:{1}', env.IMAGE_HUB, inputs.version) || '' }}
            ${{ env.IMAGE_HUB != '' && format('{0}:latest', env.IMAGE_HUB) || '' }}
          build-args: APT_UPGRADE_DATE=${{ steps.date.outputs.date }}
          # GHCR shows a multi-arch package's description from the image *index*
          # annotation (a Dockerfile LABEL alone doesn't surface on the package
          # page). Mirror the server.json / Dockerfile description here.
          annotations: |
            index:org.opencontainers.image.title=vault-cortex
            index:org.opencontainers.image.description=Standalone MCP server for Obsidian vaults — hybrid search, notes, memory, tasks, OAuth 2.1.
            index:org.opencontainers.image.source=https://github.com/aliasunder/vault-cortex
            index:org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        if: ${{ !inputs.skip_instance }}
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Wait for Docker on Lightsail
        if: ${{ !inputs.skip_instance }}
        env:
          IP: ${{ steps.ssh.outputs.host }}
        run: |
          deadline=$((SECONDS + 120))
          until ssh -o StrictHostKeyChecking=accept-new ubuntu@"$IP" 'docker --version' >/dev/null 2>&1; do
            if [ $SECONDS -ge $deadline ]; then
              echo "::error::Docker not ready on $IP after 120s"
              exit 1
            fi
            sleep 5
          done

      - name: Bootstrap deploy directory and GHCR login on instance
        if: ${{ !inputs.skip_instance }}
        env:
          IP: ${{ steps.ssh.outputs.host }}
          GHCR_USER: ${{ vars.GHCR_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new ubuntu@"$IP" \
            'sudo mkdir -p /opt/vault-cortex && sudo chown ubuntu:ubuntu /opt/vault-cortex'
          printf '%s' "$GHCR_TOKEN" | ssh -o StrictHostKeyChecking=accept-new ubuntu@"$IP" \
            "docker login ghcr.io -u '$GHCR_USER' --password-stdin"

      - name: Write Lightsail .env from secrets
        if: ${{ !inputs.skip_instance }}
        env:
          PUBLIC_URL: ${{ secrets.PUBLIC_URL }}
          MCP_AUTH_TOKEN: ${{ secrets.MCP_AUTH_TOKEN }}
          OBSIDIAN_AUTH_TOKEN: ${{ secrets.OBSIDIAN_AUTH_TOKEN }}
          VAULT_NAME: ${{ secrets.VAULT_NAME }}
          VAULT_PASSWORD: ${{ secrets.VAULT_PASSWORD }}
          GHCR_USER: ${{ vars.GHCR_USER }}
          MEMORY_DIR: ${{ vars.MEMORY_DIR }}
          PROTECTED_PATHS: ${{ vars.PROTECTED_PATHS }}
          ORPHAN_EXCLUDE_FOLDERS: ${{ vars.ORPHAN_EXCLUDE_FOLDERS }}
          SERVICE_DOCUMENTATION_URL: ${{ vars.SERVICE_DOCUMENTATION_URL }}
          TZ: ${{ vars.TZ }}
        run: |
          umask 077
          cat > "$RUNNER_TEMP/lightsail.env" <<EOF
          MCP_AUTH_TOKEN=$MCP_AUTH_TOKEN
          PUBLIC_URL=$PUBLIC_URL
          OBSIDIAN_AUTH_TOKEN=$OBSIDIAN_AUTH_TOKEN
          VAULT_NAME=$VAULT_NAME
          VAULT_PASSWORD=$VAULT_PASSWORD
          GHCR_USER=$GHCR_USER
          MEMORY_DIR=${MEMORY_DIR:-About Me}
          PROTECTED_PATHS=$PROTECTED_PATHS
          ORPHAN_EXCLUDE_FOLDERS=$ORPHAN_EXCLUDE_FOLDERS
          SERVICE_DOCUMENTATION_URL=$SERVICE_DOCUMENTATION_URL
          PUID=1000
          PGID=1000
          DEVICE_NAME=vault-cortex-lightsail
          CONFLICT_STRATEGY=merge
          SYNC_MODE=bidirectional
          LOG_LEVEL=info
          LOG_RETENTION_DAYS=365
          TZ=${TZ:-UTC}
          EOF

      - name: Ship compose + .env to instance
        if: ${{ !inputs.skip_instance }}
        env:
          IP: ${{ steps.ssh.outputs.host }}
        run: |
          scp -o StrictHostKeyChecking=accept-new docker-compose.yml ubuntu@"$IP":/opt/vault-cortex/docker-compose.yml
          scp -o StrictHostKeyChecking=accept-new "$RUNNER_TEMP/lightsail.env" ubuntu@"$IP":/opt/vault-cortex/.env

      - name: Pull and restart compose stack
        if: ${{ !inputs.skip_instance }}
        env:
          IP: ${{ steps.ssh.outputs.host }}
        run: |
          # --remove-orphans retires containers whose services no longer
          # exist in the compose file, so stack reshapes clean up after
          # themselves. --wait-timeout 300: the s6 init chain (Obsidian
          # login + sync-setup) runs inside the container before /healthz
          # comes up.
          ssh -o StrictHostKeyChecking=accept-new ubuntu@"$IP" \
            'cd /opt/vault-cortex && docker compose pull && docker compose up -d --remove-orphans --wait --wait-timeout 300 && docker image prune -f'

      - name: Healthcheck
        if: ${{ !inputs.skip_instance }}
        env:
          PUBLIC_URL: ${{ secrets.PUBLIC_URL }}
        run: curl -fsS --retry 6 --retry-delay 5 "$PUBLIC_URL/healthz"
