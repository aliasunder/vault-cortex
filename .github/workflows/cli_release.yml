name: Release CLI

# Publishes the cli/ package to npm. CLI releases are explicit and
# independent of server releases — run this workflow when a merged cli/
# change should ship. "none" publishes the current cli/package.json
# version without bumping (used for the first publish). "beta" publishes
# a prerelease under the `beta` dist-tag for testing from any branch —
# no commit, no tag, no GitHub release. Test with: npx vault-cortex@beta
#
# Safe to re-run after a failed publish: a version that is tagged but
# absent from npm is detected as a failed earlier release. Bump "none"
# publishes it as-is; any other bump fails with instructions instead of
# silently skipping the stranded version or overriding the request.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type ("none" publishes the current cli/package.json version)
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - beta
          - none

concurrency:
  group: cli-release
  cancel-in-progress: false

# Top-level token is read-only; the job declares its writes.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # gh release create (git pushes use the App token)
      id-token: write # npm provenance
    steps:
      - name: Generate App token
        if: inputs.bump != 'beta'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      # No App token here: npm ci below runs dependency lifecycle scripts,
      # which must not find a repo-write credential in .git/config. The App
      # token is supplied only to the push step.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      # No registry-url / auth token: publishing uses npm Trusted Publishing
      # (OIDC) — the trusted publisher is configured on npmjs.com for this
      # repo + workflow file, and needs npm >= 11.5.1 (bundled with Node 24).
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Calculate cli version
        id: next
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          CURRENT=$(jq -r '.version' cli/package.json)
          if [ "$CURRENT" = "null" ] || [ -z "$CURRENT" ]; then
            echo "::error::cli/package.json has no version field"
            exit 1
          fi
          if [ "$BUMP" = "beta" ]; then
            NEXT="${CURRENT}-beta.${{ github.run_number }}"
          elif [ "$BUMP" = "none" ]; then
            NEXT="$CURRENT"
          # The checked-out version being tagged yet absent from npm is the
          # signature of a release that failed at npm publish. Don't bump
          # past it (silently skips a version) and don't ignore the
          # requested bump (silently overrides intent) — stop and make the
          # operator choose.
          elif git rev-parse -q --verify "refs/tags/cli-v$CURRENT" > /dev/null \
            && ! npm view "vault-cortex@$CURRENT" version > /dev/null 2>&1; then
            echo "::error::cli-v$CURRENT is tagged but not on npm — a previous release failed at publish. Re-run with bump \"none\" to publish $CURRENT as-is, or abandon it (delete the cli-v$CURRENT tag and revert the bump commit) and re-run with your intended bump."
            exit 1
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            case "$BUMP" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            NEXT="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Releasing cli $CURRENT -> $NEXT ($BUMP)"

      - name: Refuse to republish an existing version
        env:
          NEXT: ${{ steps.next.outputs.version }}
        run: |
          if npm view "vault-cortex@$NEXT" version > /dev/null 2>&1; then
            echo "::error::vault-cortex@$NEXT is already published to npm"
            exit 1
          fi

      - run: npm ci

      - run: npx tsc -p cli/tsconfig.json

      - name: Bump cli/package.json
        if: inputs.bump != 'none'
        env:
          NEXT: ${{ steps.next.outputs.version }}
        run: |
          jq --arg v "$NEXT" '.version = $v' cli/package.json > cli/package.json.tmp && mv cli/package.json.tmp cli/package.json
          npx prettier --write cli/package.json

      - name: Commit, tag, and push
        if: inputs.bump != 'beta'
        env:
          NEXT: ${{ steps.next.outputs.version }}
          # The App token enters git only here, after npm ci has run.
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet cli/package.json; then
            git add cli/package.json
            git commit -m "release(cli): v$NEXT"
          fi
          # Tag may already exist when re-running after a failed publish.
          if ! git rev-parse -q --verify "refs/tags/cli-v$NEXT" > /dev/null; then
            git tag "cli-v$NEXT"
          fi
          git push "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD --tags

      - name: Publish to npm (Trusted Publishing / OIDC)
        env:
          TAG_FLAG: ${{ inputs.bump == 'beta' && '--tag beta' || '' }}
        run: npm publish ./cli $TAG_FLAG --provenance --access public

      - name: Beta summary
        if: inputs.bump == 'beta'
        env:
          BETA_VERSION: ${{ steps.next.outputs.version }}
        run: |
          echo "### CLI Beta Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** \`vault-cortex@${BETA_VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Test with:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "npx vault-cortex@beta" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

      # --latest=false keeps the "Latest" badge on server releases. Notes
      # list only cli/ commits — server commits interleave on main, so
      # range-wide auto-notes would include unrelated work. If this step
      # fails after a successful publish, create the release manually
      # (re-running the workflow would refuse to republish the version).
      - name: Create GitHub release
        if: inputs.bump != 'beta'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ steps.next.outputs.version }}
        run: |
          if gh release view "cli-v$NEXT" > /dev/null 2>&1; then
            echo "Release cli-v$NEXT already exists; skipping"
            exit 0
          fi
          PREV=$(git describe --tags --match "cli-v*" --abbrev=0 "cli-v$NEXT"^ 2> /dev/null || true)
          if [ -n "$PREV" ]; then
            RANGE="$PREV..cli-v$NEXT"
          else
            RANGE="cli-v$NEXT"
          fi
          {
            git log "$RANGE" --pretty="- %s" -- cli/
            echo ""
            echo "Published to npm: https://www.npmjs.com/package/vault-cortex/v/$NEXT"
          } > /tmp/release-notes.md
          gh release create "cli-v$NEXT" \
            --title "cli-v$NEXT" \
            --notes-file /tmp/release-notes.md \
            --latest=false
