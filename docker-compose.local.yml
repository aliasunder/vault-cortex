# Local development — run vault-mcp against ~/Vault without Lightsail.
# obsidian-sync is not needed locally (your Mac already has the vault).
#
# Usage:
#   docker compose -f docker-compose.local.yml up --build
#   npm run dev:docker  (same thing)

name: vault-cortex-local

services:
  vault-mcp:
    build: .
    container_name: vault-mcp-local
    environment:
      NODE_ENV: development
      PORT: "8000"
      HOST: "0.0.0.0"
      VAULT_PATH: /vault
      INDEX_DB_PATH: /data/index.db
      MCP_AUTH_TOKEN: local-dev-token
      PUBLIC_URL: http://localhost:8000
      LOG_LEVEL: debug
      MEMORY_ENABLED: ${MEMORY_ENABLED:-true}
      MEMORY_DIR: ${MEMORY_DIR:-About Me}
      TZ: ${TZ:-UTC}
      # Windows: set WINDOWS_MODE=true when developing against a vault on a C: drive
      # (polling watcher + rename-based moves across the Docker Desktop/WSL2 bridge).
      WINDOWS_MODE: ${WINDOWS_MODE:-}
      # Left empty = the server applies smart defaults
      # (<MEMORY_DIR> below is the resolved MEMORY_DIR value, default "About Me"):
      #   PROTECTED_PATHS           default: "<MEMORY_DIR>, Daily Notes"
      #   ORPHAN_EXCLUDE_FOLDERS    default: "Daily Notes, Templates, <MEMORY_DIR>"
      #   SERVICE_DOCUMENTATION_URL default: https://github.com/aliasunder/vault-cortex
      PROTECTED_PATHS: ${PROTECTED_PATHS:-}
      ORPHAN_EXCLUDE_FOLDERS: ${ORPHAN_EXCLUDE_FOLDERS:-}
      SERVICE_DOCUMENTATION_URL: ${SERVICE_DOCUMENTATION_URL:-}
    volumes:
      - ~/Vault:/vault:ro
      - mcp_local_data:/data
    ports:
      - "8000:8000"

volumes:
  mcp_local_data:
