<svg xmlns="http://www.w3.org/2000/svg" width="720" height="184" viewBox="0 0 720 184" fill="none">
  <defs>
    <!-- Banner strip background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <!-- Icon tile background (matches assets/icon-400.svg) -->
    <linearGradient id="tileGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161b22"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <!-- Neon glow -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Self-contained dark strip (works in both light and dark mode) -->
  <rect x="0" y="0" width="720" height="184" rx="28" fill="url(#bgGrad)"/>
  <!-- Faint cyan border so the strip stays defined on dark-mode README backgrounds -->
  <rect x="1.5" y="1.5" width="717" height="181" rx="26.5" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.4"/>

  <!-- Icon (same mark as assets/icon-400.svg), drawn as vector, scaled into the left -->
  <g transform="translate(24,24) scale(0.34)">
    <rect x="24" y="24" width="352" height="352" rx="76" fill="url(#tileGrad)"/>
    <rect x="25" y="25" width="350" height="350" rx="75" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.22"/>
    <g filter="url(#glow)" stroke-linecap="round">
      <line x1="112" y1="128" x2="156" y2="210" stroke="#00e5ff" stroke-width="8" opacity="0.85"/>
      <line x1="156" y1="210" x2="200" y2="292" stroke="#00e5ff" stroke-width="8" opacity="0.85"/>
      <line x1="288" y1="128" x2="244" y2="210" stroke="#00e5ff" stroke-width="8" opacity="0.85"/>
      <line x1="244" y1="210" x2="200" y2="292" stroke="#00e5ff" stroke-width="8" opacity="0.85"/>
      <line x1="112" y1="128" x2="200" y2="166" stroke="#7c3aed" stroke-width="6" opacity="0.8"/>
      <line x1="288" y1="128" x2="200" y2="166" stroke="#7c3aed" stroke-width="6" opacity="0.8"/>
      <circle cx="112" cy="128" r="22" fill="#00e5ff"/>
      <circle cx="288" cy="128" r="22" fill="#00e5ff"/>
      <circle cx="156" cy="210" r="13" fill="#00e5ff"/>
      <circle cx="244" cy="210" r="13" fill="#00e5ff"/>
      <circle cx="200" cy="166" r="12" fill="#7c3aed"/>
      <circle cx="200" cy="292" r="25" fill="#7c3aed"/>
    </g>
  </g>

  <!-- Wordmark (light fill so it reads on both light and dark backgrounds) -->
  <text x="190" y="92" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Courier New', monospace"
        font-size="52" font-weight="600" fill="#f0f6fc" letter-spacing="-1">Vault Cortex</text>

  <!-- Tagline -->
  <text x="192" y="124" font-family="'Inter', -apple-system, sans-serif" font-size="18" font-weight="400" fill="#8b949e">MCP server for Obsidian vaults</text>

  <!-- Cyan pulse accent -->
  <rect x="192" y="140" width="150" height="3" rx="1.5" fill="#00e5ff" filter="url(#glow)" opacity="0.9"/>
</svg>
