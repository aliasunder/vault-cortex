<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1280" height="640" viewBox="0 0 1280 640" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#10151d"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Constellation cluster, upper-right — a visible element balancing the icon -->
  <g filter="url(#glow)" stroke-linecap="round">
    <!-- connecting lines -->
    <line x1="980"  y1="120" x2="1090" y2="80"  stroke="#00e5ff" stroke-width="3.5" opacity="0.55"/>
    <line x1="1090" y1="80"  x2="1180" y2="160" stroke="#00e5ff" stroke-width="3.5" opacity="0.55"/>
    <line x1="980"  y1="120" x2="1050" y2="210" stroke="#7c3aed" stroke-width="3.5" opacity="0.5"/>
    <line x1="1050" y1="210" x2="1180" y2="160" stroke="#7c3aed" stroke-width="3.5" opacity="0.5"/>
    <line x1="1090" y1="80"  x2="1050" y2="210" stroke="#00e5ff" stroke-width="3"   opacity="0.4"/>
    <!-- nodes -->
    <circle cx="980"  cy="120" r="11" fill="#00e5ff" opacity="0.95"/>
    <circle cx="1090" cy="80"  r="13" fill="#00e5ff" opacity="0.95"/>
    <circle cx="1180" cy="160" r="9"  fill="#00e5ff" opacity="0.9"/>
    <circle cx="1050" cy="210" r="12" fill="#7c3aed" opacity="0.95"/>
  </g>

  <!-- The icon -->
  <image x="96" y="130" width="380" height="380" xlink:href="icon-400.png"/>

  <!-- Wordmark + tagline -->
  <text x="540" y="300" font-family="JetBrains Mono" font-size="78" font-weight="800"
        fill="#f0f6fc" letter-spacing="-2">vault-cortex</text>
  <text x="544" y="348" font-family="DejaVu Sans" font-size="27" fill="#8b949e">MCP server for Obsidian vaults</text>

  <!-- Cyan pulse accent (echoes the banner) -->
  <rect x="544" y="372" width="180" height="4" rx="2" fill="#00e5ff" filter="url(#glow)" opacity="0.9"/>

  <!-- Feature line -->
  <text x="544" y="430" font-family="DejaVu Sans" font-size="24" fill="#58a6ff">search · memory · link graph · 23 tools · OAuth</text>
</svg>
