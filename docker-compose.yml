# Runs on the Lightsail instance at /opt/vault-cortex/docker-compose.yml
#
# Single service: the vault-cortex :remote image bundles obsidian-sync and
# the MCP server under s6-overlay supervision — sync keeps /vault current
# (bidirectional Obsidian Sync) and the MCP server listens on :8000.
# Compose remains here as an operational wrapper (declarative restart
# policy, --wait healthcheck gating, log rotation), not a user requirement.
#
# API Gateway handles TLS + auth upstream. vault-cortex ALSO validates
# the bearer token in-process (Express middleware) as defense in
# depth — see src/vault-mcp/server.ts. Port 8000 is publicly bound
# but unauthenticated requests are rejected at the application layer.

name: vault-cortex

services:
  vault-cortex:
    image: ghcr.io/${GHCR_USER:?GHCR_USER required}/vault-cortex:${VAULT_CORTEX_TAG:-remote}
    container_name: vault-cortex
    hostname: ${DEVICE_NAME:-vault-cortex}
    restart: unless-stopped
    environment:
      # --- Obsidian Sync (s6 init chain + svc-obsidian-sync) ---
      OBSIDIAN_AUTH_TOKEN: ${OBSIDIAN_AUTH_TOKEN}
      VAULT_NAME: ${VAULT_NAME}
      VAULT_PASSWORD: ${VAULT_PASSWORD:-}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      DEVICE_NAME: ${DEVICE_NAME:-vault-cortex-lightsail}
      CONFLICT_STRATEGY: ${CONFLICT_STRATEGY:-merge}
      SYNC_MODE: ${SYNC_MODE:-bidirectional}
      # --- MCP server (svc-vault-mcp) ---
      NODE_ENV: production
      PORT: "8000"
      HOST: "0.0.0.0"
      VAULT_PATH: /vault
      INDEX_DB_PATH: /data/index.db
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:?MCP_AUTH_TOKEN required for in-process auth}
      PUBLIC_URL: ${PUBLIC_URL:?PUBLIC_URL required for OAuth metadata}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: /data/logs
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-30}
      TZ: ${TZ:-UTC}
      EMBEDDING_ENABLED: ${EMBEDDING_ENABLED:-true}
      RERANK_MODE: ${RERANK_MODE:-blended}
      MEMORY_ENABLED: ${MEMORY_ENABLED:-true}
      WINDOWS_MODE: ${WINDOWS_MODE:-false}
      MAX_ASSET_BYTES: ${MAX_ASSET_BYTES:-52428800}
      MAX_IMAGE_OUTPUT_BYTES: ${MAX_IMAGE_OUTPUT_BYTES:-49152}
      MEMORY_DIR: ${MEMORY_DIR:-About Me}
      # Left empty = the server applies smart defaults
      # (<MEMORY_DIR> below is the resolved MEMORY_DIR value, default "About Me"):
      #   PROTECTED_PATHS           default: "<MEMORY_DIR>, Daily Notes"
      #   ORPHAN_EXCLUDE_FOLDERS    default: "Daily Notes, Templates, <MEMORY_DIR>"
      #   SERVICE_DOCUMENTATION_URL default: https://github.com/aliasunder/vault-cortex
      PROTECTED_PATHS: ${PROTECTED_PATHS:-}
      ORPHAN_EXCLUDE_FOLDERS: ${ORPHAN_EXCLUDE_FOLDERS:-}
      SERVICE_DOCUMENTATION_URL: ${SERVICE_DOCUMENTATION_URL:-}
    volumes:
      - vault_data:/vault
      - mcp_index_data:/data
      - obsidian_config:/home/obsidian/.config
    ports:
      - "0.0.0.0:8000:8000"
    # start_period covers the s6 init chain (Obsidian login + sync-setup)
    # that runs before the MCP server boots. Failures during start_period
    # don't count against retries; a fast boot flips healthy immediately.
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

volumes:
  # Explicit names pin these to the volumes that already exist on the
  # host — a rename (or project-name drift) silently creates fresh empty
  # volumes, detaching the synced vault, search index, and Obsidian
  # login state.
  vault_data: { name: vault-cortex_vault_data }
  mcp_index_data: { name: vault-cortex_mcp_index_data }
  obsidian_config: { name: vault-cortex_obsidian_config }
