# Lightsail deployment compose. Copy to /opt/vault-cortex/docker-compose.yml.
# Requires .env alongside — see docker/.env.example.

name: vault-cortex

services:
  # Belphemur's obsidian-headless Docker image.
  # Runs `ob sync --continuous` for bidirectional Obsidian Sync.
  # Auth: OBSIDIAN_AUTH_TOKEN from Belphemur's `get-token` helper.
  obsidian-sync:
    image: ghcr.io/belphemur/obsidian-headless-sync-docker:latest
    container_name: obsidian-sync
    restart: unless-stopped
    environment:
      OBSIDIAN_AUTH_TOKEN: ${OBSIDIAN_AUTH_TOKEN}
      VAULT_NAME: ${VAULT_NAME}
      VAULT_PASSWORD: ${VAULT_PASSWORD:-}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      DEVICE_NAME: vault-cortex-lightsail
      SYNC_MODE: bidirectional
      TZ: ${TZ:-America/Toronto}
    volumes:
      - vault_data:/vault
      - obsidian_config:/config
    mem_limit: 768m
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'ob sync' >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks: [cortex]

  # Custom MCP server. Express + StreamableHTTPServerTransport + FTS5.
  # Vault is READ-ONLY here — writes go through vault.ts which handles
  # the mount. Port 8000 on 0.0.0.0 for API Gateway access.
  vault-mcp:
    image: ghcr.io/${GHCR_USER:-aliasunder}/vault-mcp:${VAULT_MCP_TAG:-latest}
    container_name: vault-mcp
    restart: unless-stopped
    depends_on:
      obsidian-sync: { condition: service_started }
    environment:
      NODE_ENV: production
      PORT: "8000"
      HOST: "0.0.0.0"
      VAULT_PATH: /vault
      INDEX_DB_PATH: /data/index.db
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TZ: ${TZ:-America/Toronto}
    volumes:
      - vault_data:/vault
      - mcp_data:/data
    ports:
      - "0.0.0.0:8000:8000"
    mem_limit: 768m
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks: [cortex]

volumes:
  vault_data:      { name: vault-cortex_vault }
  mcp_data:        { name: vault-cortex_mcp_data }
  obsidian_config: { name: vault-cortex_ob_config }

networks:
  cortex: { driver: bridge }
